apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: contos-air
  labels:
    app.kubernetes.io/name: contos-air
    app.kubernetes.io/part-of: contos-air-project
    kubernetes.azure.com/generator: devhub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: contos-air
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80